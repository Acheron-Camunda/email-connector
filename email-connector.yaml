services:
  email-connector:
    image: email-connector:latest
    container_name: email-connector

    environment:
      - CAMUNDA_CLIENT_MODE=self-managed
      - CAMUNDA_CLIENT_RESTADDRESS=http://orchestration:8080
      - CAMUNDA_CLIENT_GRPCADDRESS=http://orchestration:26500
      - CAMUNDA_CLIENT_AUTH_METHOD=oidc
      - CAMUNDA_CLIENT_AUTH_TOKENURL=http://keycloak:18080/auth/realms/camunda-platform/protocol/openid-connect/token
      - CAMUNDA_CLIENT_AUTH_CLIENTID=connectors
      - CAMUNDA_CLIENT_AUTH_CLIENTSECRET=<camunda-client-secret>
      - CAMUNDA_CONNECTOR_POLLING_ENABLED=true
      - CAMUNDA_CONNECTOR_WEBHOOK_ENABLED=false
      - OPERATE_CLIENT_ENABLED=false
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USERNAME=<your-email>
      - EMAIL_PASSWORD=<your-email-password>
      - AWS_ACCESS_KEY_ID=<aws-access-key>
      - AWS_SECRET_ACCESS_KEY=<aws-secret-key>

    networks:
      - 8dot8_camunda-platform

networks:
  8dot8_camunda-platform:
    external: true
